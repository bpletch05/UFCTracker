<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pack UFC Tracker</title>
<style>
  :root{
    --black:#0B0B0C;
    --card:#19191B;
    --card-alt:#202022;
    --line:#2D2D2D;
    --red:#D20A0A;
    --red-dim:#7A0808;
    --gold:#C1A14F;
    --steel:#8E96A0;
    --white:#F5F5F2;
    --dim:#9A9A9C;
    --muted:#6B6B6D;
    --win:#3FA34D;
    --loss:#C1272D;
    --draw:#8B8560;
    --font-display: -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--black); color:var(--white);
    font-family: Inter, "Segoe UI", system-ui, -apple-system, sans-serif;
    min-height:100vh;
  }
  .display{
    font-family: var(--font-display);
    font-weight:800;
    letter-spacing:-0.01em;
  }
  .mono{ font-family: ui-monospace, SFMono-Regular, "IBM Plex Mono", Menlo, monospace; }

  header{
    padding:20px 24px 0 24px;
    background: var(--black);
    border-bottom: 2px solid var(--gold);
  }
  .brand{ display:flex; align-items:center; justify-content:space-between; gap:16px; padding-left:2px; flex-wrap:wrap; }
  .brand-left{ display:flex; align-items:center; gap:14px; }
  .brand-accent{
    width:6px; height:36px; border-radius:2px;
    background: linear-gradient(180deg, var(--red) 0%, var(--red) 55%, var(--gold) 100%);
    box-shadow: 0 0 10px rgba(210,10,10,0.5);
  }
  .brand .display{ font-size:26px; color:var(--white); }
  .brand .sub{ color:var(--dim); font-size:12.5px; margin-top:2px; letter-spacing:0.04em; }
  .brand-titles{ display:flex; flex-direction:column; }

  .brand-title{ font-size:31px; letter-spacing:-0.01em; white-space:nowrap; display:flex; align-items:center; }
  .word-pack{ color:var(--gold); }
  .word-ufc{
    display:inline-block;
    color:var(--red);
    font-style:italic;
    transform: skewX(-8deg);
    -webkit-text-stroke: 0.6px var(--gold);
    text-shadow: 2px 2px 0 rgba(0,0,0,0.55);
    margin:0 3px;
    padding:0 1px;
  }
  .belt-icon{ height:34px; width:auto; margin-left:10px; flex-shrink:0; }

  .org-logos{ display:flex; gap:10px; align-items:center; }
  .org-badge{
    height:40px; padding:6px 12px; border-radius:6px; display:flex; align-items:center; justify-content:center;
    font-family: var(--font-display); font-weight:800; font-size:12px; letter-spacing:0.02em;
    border:2px solid var(--line); background:#FFFFFF;
  }
  .org-badge.ufc{ border-color:var(--red); }
  .org-badge.pfl{ border-color:var(--steel); }
  .org-badge img{ height:100%; width:auto; object-fit:contain; display:block; }

  nav{ display:flex; gap:2px; padding:14px 12px 0 12px; overflow-x:auto; }
  .tab{
    padding:10px 18px; cursor:pointer; color:var(--dim);
    font-size:14px; font-weight:600;
    border-bottom:3px solid transparent; white-space:nowrap;
  }
  .tab:hover{ color:var(--white); }
  .tab.active{ color:var(--white); border-bottom-color:var(--red); }
  .tab .dot{ display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:6px; }

  main{ max-width:1180px; margin:0 auto; padding:22px 20px 80px 20px; }

  .toolbar{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px; align-items:center; }
  input[type=text], select{
    background:var(--card); border:1px solid var(--line); color:var(--white);
    padding:9px 12px; border-radius:3px; font-size:13px;
  }
  input[type=text]{ flex:1; min-width:180px; }
  input[type=text]:focus, select:focus{ outline:1px solid var(--gold); }

  .roster-refresh-bar{ display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:16px; padding:10px 12px; background:var(--card-alt); border:1px solid var(--line); border-radius:4px; }
  .roster-refresh-bar .stale{ margin:0; }
  .roster-btn{
    background:var(--black); border:1px solid var(--gold); color:var(--gold);
    padding:8px 14px; border-radius:3px; font-size:12.5px; font-weight:700; cursor:pointer;
  }
  .roster-btn:hover{ background:rgba(193,161,79,0.12); }
  .roster-btn:disabled{ opacity:0.5; cursor:wait; }
  .roster-btn.err{ border-color:var(--loss); color:var(--loss); }

  .roster-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:12px; }

  .card{
    background:var(--card); border:1px solid var(--line); border-radius:4px;
    padding:14px 14px 12px 16px; position:relative; overflow:hidden;
  }
  .card::before{
    content:""; position:absolute; left:0; top:0; bottom:0; width:4px;
  }
  .card.ufc::before{ background:var(--red); }
  .card.pfl::before{ background:var(--steel); }

  .card-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
  .fname{ font-size:18px; margin:0; cursor:pointer; }
  .fname:hover{ color:var(--gold); }
  .fname .caret{ font-size:11px; color:var(--muted); margin-left:6px; font-family: Inter, sans-serif; }
  .fmeta{ color:var(--dim); font-size:12px; margin-top:3px;}
  .org-tag{ font-size:11px; padding:2px 7px; border-radius:2px; font-weight:700; }
  .org-tag.UFC{ background:rgba(210,10,10,0.16); color:#f0797d; }
  .org-tag.PFL{ background:rgba(142,150,160,0.2); color:#c7ccd2; }
  .rank-badge{ font-size:11px; padding:2px 7px; border-radius:2px; font-weight:800; background:rgba(193,161,79,0.18); color:var(--gold); margin-left:6px; white-space:nowrap; }

  .division-pills{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
  .division-pill{
    background:var(--card); border:1px solid var(--line); color:var(--dim);
    padding:7px 13px; border-radius:16px; font-size:12px; font-weight:600; cursor:pointer;
  }
  .division-pill:hover{ border-color:var(--gold); color:var(--white); }
  .division-pill.active{ background:var(--red); border-color:var(--red); color:#fff; }
  .division-pill.clear{ border-style:dashed; color:var(--muted); }

  .stars{ display:flex; gap:5px; margin-top:10px; }
  .starbtn{
    width:26px; height:26px; border-radius:50%; border:1.5px solid var(--line);
    background:transparent; color:var(--muted); font-size:11px; font-weight:800;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    font-family: Inter, sans-serif;
  }
  .starbtn.Brooks.on{ background:var(--red); border-color:var(--red); color:#fff; }
  .starbtn.Vinnie.on{ background:var(--steel); border-color:var(--steel); color:#151516; }
  .starbtn.Alonzo.on{ background:var(--gold); border-color:var(--gold); color:#231c05; }

  .intel-btn{
    margin-top:12px; width:100%; background:var(--card-alt); border:1px solid var(--line);
    color:var(--white); padding:8px; border-radius:3px; font-size:12.5px; font-weight:600; cursor:pointer;
  }
  .intel-btn:hover{ border-color:var(--gold); }
  .intel-btn:disabled{ opacity:0.5; cursor:wait; }

  .intel-box{ margin-top:12px; border-top:1px dashed var(--line); padding-top:10px; }
  .tape-row{ display:flex; justify-content:space-between; font-size:12px; padding:3px 0; }
  .tape-row .lbl{ color:var(--muted); font-size:11px; }
  .record{ font-size:20px; color:var(--gold); }
  .record .w{ color:var(--win); } .record .l{ color:var(--loss); } .record .d{ color:var(--draw); }

  .fightline{ display:flex; justify-content:space-between; font-size:12.5px; padding:4px 0; border-bottom:1px solid var(--line); gap:6px; }
  .fightline:last-child{ border-bottom:none; }
  .res-W{ color:var(--win); font-weight:800; } .res-L{ color:var(--loss); font-weight:800; } .res-D{ color:var(--draw); font-weight:800; }

  .next-fight{ background:var(--card-alt); border:1px solid var(--gold); border-radius:3px; padding:8px 10px; margin-top:8px; font-size:12.5px; }
  .next-fight .lbl{ color:var(--gold); font-size:11px; font-weight:700; }

  .news-item{ font-size:12px; color:var(--dim); margin-top:6px; padding-left:10px; border-left:2px solid var(--line); }
  .stale{ color:var(--muted); font-size:11px; margin-top:8px; }

  .section-title{ display:flex; align-items:baseline; gap:10px; margin:26px 0 12px 0; }
  .section-title .display{ font-size:21px; color:var(--white); }
  .section-title .bar{ flex:1; height:1px; background:var(--line); }
  .section-title.ufc .display{ border-bottom:2px solid var(--red); padding-bottom:3px; }
  .section-title.pfl .display{ border-bottom:2px solid var(--steel); padding-bottom:3px; }

  .empty{ color:var(--muted); border:1px dashed var(--line); border-radius:4px; padding:30px; text-align:center; font-size:13px; }

  .person-header{ display:flex; align-items:center; gap:12px; margin-bottom:6px;}
  .corner-chip{ width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:14px; font-family: Inter, sans-serif; }
  .Brooks-chip{ background:var(--red); color:#fff; }
  .Vinnie-chip{ background:var(--steel); color:#151516; }
  .Alonzo-chip{ background:var(--gold); color:#231c05; }

  .dash-fighter{ display:flex; gap:12px; }
  .dash-fighter .who{ display:flex; flex-direction:column; gap:4px; }

  .event-card{ background:var(--card); border:1px solid var(--line); border-radius:4px; padding:14px 16px; position:relative; overflow:hidden; }
  .event-card::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:4px; }
  .event-card.ufc::before{ background:var(--red); }
  .event-card.pfl::before{ background:var(--steel); }
  .event-name{ font-size:17px; margin:0 0 4px 0; color:var(--white); }
  .event-meta{ color:var(--dim); font-size:12.5px; }
  .event-main{ margin-top:8px; font-size:13px; color:var(--gold); }

  footer{ text-align:center; color:var(--muted); font-size:11px; padding:30px 0 10px 0; }
</style>
</head>

// Drop-in replacements for the old window.storage.get/set calls, backed by a
// single Supabase table called kv_store (key text primary key, value jsonb).
async function kvGet(key){
  const { data, error } = await sb.from('kv_store').select('value').eq('key', key).maybeSingle();
  if(error) throw error;
  if(!data) return null;
  return { value: data.value };
}
async function kvSet(key, value){
  const { error } = await sb.from('kv_store').upsert({ key, value, updated_at: new Date().toISOString() });
  if(error) throw error;
  return { key, value };
}

const DIVISION_ORDER = ["Flyweight","Bantamweight","Featherweight","Lightweight","Welterweight","Middleweight","Light Heavyweight","Heavyweight","Women's Strawweight","Women's Flyweight","Women's Bantamweight","Women's Featherweight"];

// Distinct divisions present in a fighter list, sorted by actual weight-class order.
function distinctDivisions(list){
  const set = new Set(list.map(f=>f.division));
  return Array.from(set).sort((a,b)=>{
    const ia = DIVISION_ORDER.indexOf(a), ib = DIVISION_ORDER.indexOf(b);
    if(ia === -1 && ib === -1) return a.localeCompare(b);
    if(ia === -1) return 1;
    if(ib === -1) return -1;
    return ia - ib;
  });
}

// ---------- Robust JSON extraction ----------
// Handles cases where the model's output got cut off mid-object (e.g. hit max_tokens),
// by progressively trimming back to the last complete element.
function extractJSON(text, open, close){
  const start = text.indexOf(open);
  if(start === -1) throw new Error("no "+open+" found in response");
  let candidate = text.slice(start);
  // First try the naive approach: last matching close bracket
  const naiveEnd = candidate.lastIndexOf(close);
  if(naiveEnd !== -1){
    try{ return JSON.parse(candidate.slice(0, naiveEnd+1)); }catch(e){}
  }
  // Repair: walk backwards from the end, trimming to the last complete "},"
  let end = candidate.length;
  while(end > 0){
    let attempt = candidate.slice(0, end).trim();
    if(attempt.endsWith(",")) attempt = attempt.slice(0,-1);
    if(!attempt.endsWith(close)) attempt = attempt + close;
    try{ return JSON.parse(attempt); }catch(e){}
    const idx = candidate.lastIndexOf("},", end-1);
    if(idx === -1) break;
    end = idx+1;
  }
  throw new Error("could not repair JSON");
}

function yearsSince(dateStr){
  if(!dateStr) return null;
  const d = new Date(dateStr);
  if(isNaN(d.getTime())) return null;
  return (Date.now() - d.getTime()) / (1000*60*60*24*365.25);
}

async function callClaude(prompt, maxTokens){
  const resp = await fetch("/.netlify/functions/claude-proxy", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ prompt, maxTokens })
  });
  const data = await resp.json();
  const textBlocks = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
  return textBlocks.replace(/```json|```/g,"").trim();
}

async function fetchIntel(id, force){
  const fighter = fighterById(id);
  if(!fighter) return;
  if(!force && state.intel[id] && (Date.now() - state.intel[id].ts) < INTEL_MAX_AGE_MS){
    render();
    return;
  }
  state.loading[id] = true; render();
  const prompt = `Search the web for up to date information on the MMA fighter "${fighter.name}" who competes in ${fighter.org} (${fighter.division}). ` +
    `Respond with ONLY a raw JSON object, no markdown fences, no commentary, matching exactly this shape: ` +
    `{"record":"W-L-D as a string or null","recentFights":[{"opponent":"","result":"W|L|D|NC","method":"","date":"YYYY-MM-DD or approximate"}] (up to 5, most recent first),` +
    `"nextFight":{"opponent":"","event":"","date":""} or null if nothing scheduled,` +
    `"retired": true or false (true if the fighter has publicly announced retirement),` +
    `"lastFightDate":"YYYY-MM-DD of their most recent fight, or null if unknown",` +
    `"news":["short factual bullet with rough date"] (up to 2 recent items)}. If you cannot find something, use null or an empty array for that field.`;

  try{
    const cleaned = await callClaude(prompt, 1200);
    const parsed = extractJSON(cleaned, "{", "}");
    parsed.ts = Date.now();
    state.intel[id] = parsed;
    state.expanded[id] = true;
    try{ await kvSet(`intel:${id}`, JSON.stringify(parsed)); }catch(e){}
  }catch(e){
    state.intel[id] = { error:true, ts:Date.now() };
    console.error("intel fetch failed for", fighter.name, e);
  }
  state.loading[id] = false;
  render();
}

  "Flyweight":"flyweight", "Bantamweight":"bantamweight", "Featherweight":"featherweight",
  "Lightweight":"lightweight", "Welterweight":"welterweight", "Middleweight":"middleweight",
  "Light Heavyweight":"lightheavyweight", "Heavyweight":"heavyweight",

async function refreshRoster(org){
  state.rosterLoading[org] = true; state.rosterError[org] = false;
  const divisions = org === "UFC" ? UFC_DIVISIONS : PFL_DIVISIONS;
  state.rosterProgress[org] = { current:0, total:divisions.length, label:divisions[0] };
  render();

  const collected = [];
  let anySuccess = false;

  for(let i=0;i<divisions.length;i++){
    const division = divisions[i];
    state.rosterProgress[org] = { current:i+1, total:divisions.length, label:division };
    render();

    let prompt;
    if(org === "UFC"){
      const slugName = ROSTER_WATCH_SLUG[division];
      const url = `https://www.roster.watch/${slugName}.html`;
      prompt = `Go to ${url} — this is roster.watch's page listing the complete active UFC ${division} roster in a table. ` +
        `The table on that page typically lists anywhere from 20 to 90 fighters; extract EVERY single fighter row in that table, not just the ranked top 15. Do not stop early. ` +
        `Respond with ONLY a raw JSON array, no markdown fences, no commentary, of objects shaped exactly like: {"name":""}. ` +
        `Keep the JSON compact (no extra whitespace) so the full list fits in the response.`;
    } else {
      prompt = `Search pflmma.com's roster/fighters listing for the FULL current roster of active PFL fighters in the ${division} division specifically. ` +
        `List every currently-signed, active fighter you can find in this division — this should be the complete roster, not just the top 10-15 ranked contenders. ` +
        `For each fighter give their most recent fight date if you can determine it. ` +
        `Respond with ONLY a raw JSON array, no markdown fences, no commentary, of objects shaped exactly like: ` +
        `{"name":"","lastFightDate":"YYYY-MM-DD or null if unknown","retired":true or false}. ` +
        `Exclude anyone who has publicly announced retirement, and exclude anyone whose last fight was more than ${INACTIVE_YEARS_CUTOFF} years ago. Keep the JSON compact.`;
    }

    try{
      const cleaned = await callClaude(prompt, 20000);
      let list = extractJSON(cleaned, "[", "]");
      if(org !== "UFC"){
        list = list.filter(f=>{
          if(f.retired) return false;
          const yrs = yearsSince(f.lastFightDate);
          if(yrs !== null && yrs > INACTIVE_YEARS_CUTOFF) return false;
          return true;
        });
      }
      list.forEach(f=>{
        if(!f.name) return;
        collected.push({ name:f.name, org, division, id:slug(f.name), lastFightDate:f.lastFightDate||null });
      });
      anySuccess = true;
    }catch(e){
      console.error("division roster fetch failed for", org, division, e);
    }
  }

  if(!anySuccess){
    state.rosterError[org] = true;
  } else {
    const seen = new Set();
    const fighters = collected.filter(f=>{ if(seen.has(f.id)) return false; seen.add(f.id); return true; });

    const starredIds = new Set();
    PEOPLE.forEach(p=>state.stars[p].forEach(id=>starredIds.add(id)));
    const keepOld = state.fighters.filter(f=>f.org===org && starredIds.has(f.id) && !fighters.find(nf=>nf.id===f.id));

    const others = state.fighters.filter(f=>f.org!==org);
    state.fighters = others.concat(fighters, keepOld);
    state.rosterMeta[org] = { ts: Date.now() };
    try{ await kvSet(`roster:${org}`, JSON.stringify({ts:Date.now(), fighters, seedVersion:SEED_VERSION})); }catch(e){}
  }
  state.rosterLoading[org] = false;
  state.rosterProgress[org] = null;
  render();
}

  const prompt = `Search ${source} for the next 5 announced upcoming ${org} MMA events. ` +

    `{"name":"event name e.g. UFC 311 or PFL 5","date":"YYYY-MM-DD","location":"city, venue if known","mainEvent":"short description of the main event fight if announced, else empty string"}. ` +

}

async function refreshRankings(){

    `For every men's and women's UFC weight division, list the current champion and the numbered contenders shown (as many as the page lists, typically up to 15). ` +
    `Respond with ONLY a raw JSON array, no markdown fences, no commentary, of objects shaped exactly like: ` +
    `{"name":"","division":"","rank":"C for the champion, otherwise a number as a string like \\"1\\", \\"2\\""}. ` +

  render();
}

async function autoLoadStarredIntel(){

function intelBlock(fighter){
  const box = el("div","intel-box");
  const info = state.intel[fighter.id];
  if(info.error){
    box.appendChild(el("div","stale","Couldn't fetch data right now — try again."));
    return box;
  }
  if(info.record){
    const rec = el("div","record mono", info.record);
    box.appendChild(rec);
  }
  if(info.recentFights && info.recentFights.length){
    const label = el("div","tape-row"); label.innerHTML = `<span class="lbl">Last ${info.recentFights.length} fights</span>`;
    box.appendChild(label);
    info.recentFights.slice(0,5).forEach(f=>{
      const row = el("div","fightline");
      const resClass = "res-"+(f.result==="NC"?"D":f.result);
      row.innerHTML = `<span>vs ${f.opponent||"—"}</span><span class="${resClass}">${f.result||"?"}</span><span class="mono" style="color:var(--muted)">${f.method||""} · ${f.date||""}</span>`;
      box.appendChild(row);
    });
  }
  if(info.nextFight && info.nextFight.opponent){
    const nf = el("div","next-fight");
    nf.innerHTML = `<div class="lbl">Next fight</div>vs ${info.nextFight.opponent} — ${info.nextFight.event||"TBA"} <span class="mono">(${info.nextFight.date||"date TBA"})</span>`;
    box.appendChild(nf);
  } else {
    box.appendChild(el("div","stale","No fight currently scheduled."));
  }
  if(info.news && info.news.length){
    info.news.slice(0,2).forEach(n=>{
      box.appendChild(el("div","news-item", n));
    });
  }
  const age = Math.round((Date.now()-info.ts)/60000);
  box.appendChild(el("div","stale", `Updated ${age<1?"just now":age+" min ago"}`));
  return box;
}

  const rleft = el("div");
  const rTs = state.rankings.UFC ? state.rankings.UFC.ts : null;
  rleft.appendChild(el("div","stale", `UFC Meta Rankings updated: ${state.rankingsError ? "refresh failed — try again" : (rTs ? new Date(rTs).toLocaleString() : "loading automatically…")}`));
  rbar.appendChild(rleft);
  const rbtn = el("button","roster-btn"+(state.rankingsError?" err":""), state.rankingsLoading ? "Refreshing…" : (state.rankingsError ? "Retry rankings" : "Refresh rankings"));
  rbtn.disabled = state.rankingsLoading;
  rbtn.onclick = ()=>refreshRankings();
  rbar.appendChild(rbtn);
  container.appendChild(rbar);

  const toolbar = el("div","toolbar");
  const search = el("input"); search.type="text"; search.placeholder="Search fighters...";
  search.value = state.search;
  search.oninput = (e)=>{ state.search = e.target.value; renderList(); };
  const sel = el("select");
  ["ALL","UFC","PFL"].forEach(o=>{
    const opt = el("option", null, o==="ALL"?"All orgs":o); opt.value=o;
    if(state.orgFilter===o) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.onchange = (e)=>{ state.orgFilter = e.target.value; render(); };
  toolbar.appendChild(search); toolbar.appendChild(sel);
  container.appendChild(toolbar);

  const orgPool = state.fighters.filter(f => state.orgFilter==="ALL" || f.org===state.orgFilter);
  container.appendChild(renderDivisionPills("Roster", distinctDivisions(orgPool)));

  const contentWrap = el("div");
  container.appendChild(contentWrap);

  function renderList(){
    contentWrap.innerHTML = "";
    const q = state.search.trim().toLowerCase();
    const divFilter = state.divisionFilter.Roster;
    const filtered = orgPool
      .filter(f => !q || f.name.toLowerCase().includes(q) || f.division.toLowerCase().includes(q))
      .filter(f => !divFilter.length || divFilter.includes(f.division))
      .sort((a,b)=> a.name.localeCompare(b.name));
    if(!filtered.length){ contentWrap.appendChild(el("div","empty","No fighters match that search.")); return; }
    const grid = el("div","roster-grid");
    filtered.forEach(f => grid.appendChild(fighterCard(f)));
    contentWrap.appendChild(grid);
  }
  renderList();
}

function renderPersonTab(container, person){
  const header = el("div","person-header");
  header.appendChild(el("div","corner-chip "+person+"-chip", person[0]));
  header.appendChild(el("h2","display", person+"'s fighters"));
  container.appendChild(header);

  const ids = state.stars[person];
  const fighters = state.fighters.filter(f => ids.includes(f.id));
  if(!fighters.length){
    container.appendChild(el("div","empty", `No fighters starred yet. Head to the Roster tab and tap the "${person[0]}" badge on your favorites.`));
    return;
  }
  container.appendChild(renderDivisionPills(person, distinctDivisions(fighters)));
  const divFilter = state.divisionFilter[person];
  const filtered = fighters
    .filter(f => !divFilter.length || divFilter.includes(f.division))
    .sort((a,b)=>a.name.localeCompare(b.name));
  if(!filtered.length){
    container.appendChild(el("div","empty","No fighters match the selected division filters."));
    return;
  }
  const grid = el("div","roster-grid");
  filtered.forEach(f => grid.appendChild(fighterCard(f, {alwaysShow:true})));
  container.appendChild(grid);
}

function renderDashboard(container){
  container.appendChild(el("h2","display","Group dashboard"));
  const allStarred = {};
  PEOPLE.forEach(p=>{
    state.stars[p].forEach(id=>{
      if(!allStarred[id]) allStarred[id] = [];
      allStarred[id].push(p);
    });
  });
  const ids = Object.keys(allStarred);
  if(!ids.length){
    container.appendChild(el("div","empty","Nobody has starred any fighters yet. Head to the Roster tab to add your favorites."));
    return;
  }

  const upcoming = ids
    .map(id => ({id, fighter: fighterById(id), intel: state.intel[id]}))
    .filter(x => x.fighter && x.intel && x.intel.nextFight && x.intel.nextFight.opponent);

  const t1 = el("div","section-title");
  t1.innerHTML = `<span class="display">Upcoming fights</span><span class="bar"></span>`;
  container.appendChild(t1);
  if(!upcoming.length){
    container.appendChild(el("div","empty","No upcoming fights loaded yet — data is pulling in automatically, check back in a moment."));
  } else {
    upcoming.sort((a,b)=> (a.intel.nextFight.date||"9999").localeCompare(b.intel.nextFight.date||"9999"));
    const grid = el("div","roster-grid");
    upcoming.forEach(x=>{
      const card = el("div","card "+x.fighter.org.toLowerCase());
      card.innerHTML = `<h3 class="fname display">${x.fighter.name}</h3><div class="fmeta">${x.fighter.division} · starred by ${allStarred[x.id].join(", ")}</div>`;
      const nf = el("div","next-fight");
      nf.innerHTML = `<div class="lbl">Next fight</div>vs ${x.intel.nextFight.opponent} — ${x.intel.nextFight.event||"TBA"} <span class="mono">(${x.intel.nextFight.date||"date TBA"})</span>`;
      card.appendChild(nf);
      grid.appendChild(card);
    });
    container.appendChild(grid);
  }

  const t2 = el("div","section-title");
  t2.innerHTML = `<span class="display">Recent form</span><span class="bar"></span>`;
  container.appendChild(t2);
  const grid2 = el("div","roster-grid");
  ids.forEach(id=>{
    const fighter = fighterById(id);
    if(!fighter) return;
    const info = state.intel[id];
    const card = el("div","card "+fighter.org.toLowerCase());
    const head = el("div","dash-fighter");
    const chips = el("div", null);
    allStarred[id].forEach(p=>{
      const c = el("span","corner-chip "+p+"-chip", p[0]);
      c.style.width="20px"; c.style.height="20px"; c.style.fontSize="10px"; c.style.marginRight="3px"; c.style.display="inline-flex";
      chips.appendChild(c);
    });
    const who = el("div","who");
    who.appendChild(el("h3","fname display",fighter.name));
    who.appendChild(el("div","fmeta",fighter.division));
    who.appendChild(chips);
    head.appendChild(who);
    card.appendChild(head);

    if(!info){
      card.appendChild(el("div","stale", state.loading[id] ? "Pulling data…" : "Loading…"));
      if(!state.loading[id]) fetchIntel(id, false);
    } else {
      card.appendChild(intelBlock(fighter));
    }
    const refresh = el("button","intel-btn", state.loading[id] ? "Fetching…" : "Refresh fighter data");
    refresh.disabled = !!state.loading[id];
    refresh.onclick = ()=>fetchIntel(id, true);
    card.appendChild(refresh);
    grid2.appendChild(card);
  });
  container.appendChild(grid2);
}

function renderEventsTab(container){
  ["UFC","PFL"].forEach(org=>{
    const t = el("div","section-title "+org.toLowerCase());
    t.innerHTML = `<span class="display">${org} — next 5 events</span><span class="bar"></span>`;
    container.appendChild(t);

    const bar = el("div","roster-refresh-bar");
    const meta = state.events[org];
    const label = meta ? new Date(meta.ts).toLocaleString() : (state.eventsError[org] ? "refresh failed" : "loading automatically…");
    bar.appendChild(el("div","stale", `Updated: ${label}`));
    const btn = el("button","roster-btn"+(state.eventsError[org]?" err":""), state.eventsLoading[org] ? "Refreshing…" : (state.eventsError[org] ? "Retry" : "Refresh"));
    btn.disabled = state.eventsLoading[org];
    btn.onclick = ()=>refreshEvents(org);
    bar.appendChild(btn);
    container.appendChild(bar);

    const list = meta && meta.list ? meta.list : [];
    if(!list.length){
      container.appendChild(el("div","empty", state.eventsLoading[org] ? "Pulling upcoming events…" : "No events loaded yet."));
      return;
    }
    const grid = el("div","roster-grid");
    list.forEach(ev=>{
      const card = el("div","event-card "+org.toLowerCase());
      card.appendChild(el("h3","event-name display", ev.name||"TBA"));
      card.appendChild(el("div","event-meta", `${ev.date||"date TBA"} · ${ev.location||"location TBA"}`));
      if(ev.mainEvent){
        card.appendChild(el("div","event-main", ev.mainEvent));
      }
      grid.appendChild(card);
    });
    container.appendChild(grid);
  });
}

function render(){
  renderTabs();
  const main = document.getElementById("main");
  main.innerHTML = "";
  if(state.activeTab === "Dashboard"){
    renderDashboard(main);
  } else if(PEOPLE.includes(state.activeTab)){
    renderPersonTab(main, state.activeTab);
  } else if(state.activeTab === "Roster"){
    renderRosterTab(main);
  } else if(state.activeTab === "Events"){
    renderEventsTab(main);
  }
}

(async function init(){
  await loadStars();
  await loadCachedRoster();
  await loadCachedEvents();
  await loadCachedRankings();
  render();
  // Roster is now seeded from a full compiled snapshot, so we don't auto-refresh
  // it on every load — use the manual "Refresh roster" buttons on the Roster tab
  // if you want to re-sync against ufc.com/pflmma.com later.
  autoRefreshEventsIfStale("UFC");
  autoRefreshEventsIfStale("PFL");
  autoRefreshRankingsIfStale();
  autoLoadStarredIntel();
})();
</script>
</body>
</html>
